name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: cargo test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  features:
    name: zpinger feature matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Each entry is a comma-separated list of zpinger features
        # (or empty for `--no-default-features` with nothing on top).
        # Default + `all` are already covered by the `test` job.
        feature_set:
          - ""                    # no features → trait + uri + util only
          - "tcp"
          - "udp"
          - "dns"
          - "tcp,udp,dns"         # the no-TLS minimal real config
          - "http"                # pulls _tls
          - "ws"                  # _tls + tokio-tungstenite + futures-util
          - "mqtt"                # _tls (shared)
          - "hls"                 # _tls (shared)
          - "grpc"                # tonic stack, separate from _tls
          - "tls"                 # TLS handshake only — pulls _tls
          - "ntp"
          - "stun"
          - "turn"
          - "ntp,stun,turn"       # all UDP infra pingers, no TLS
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo check ${{ matrix.feature_set || 'no-features' }}
        run: |
          if [ -z "${{ matrix.feature_set }}" ]; then
            cargo check -p zpinger --no-default-features
          else
            cargo check -p zpinger --no-default-features --features "${{ matrix.feature_set }}"
          fi
